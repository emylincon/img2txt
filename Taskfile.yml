# https://taskfile.dev

version: "3"

vars:
  VENV: .venv
  PYTHON: "{{.VENV}}/bin/python"
  PIP: "{{.VENV}}/bin/pip"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  setup:
    desc: Create venv and install all dependencies
    cmds:
      - python3 -m venv {{.VENV}}
      - "{{.PIP}} install --upgrade pip"
      - "{{.PIP}} install -r requirements-dev.txt"
    status:
      - test -d {{.VENV}}

  install:
    desc: Install dependencies into existing venv
    cmds:
      - "{{.PIP}} install -r requirements-dev.txt"

  run:
    desc: Launch the IMG2TXT application
    cmds:
      - "{{.PYTHON}} -m src.main"

  test:
    desc: Run all tests
    cmds:
      - "{{.PYTHON}} -m pytest tests/ -v"

  test:watch:
    desc: Run tests on file change
    cmds:
      - "{{.PYTHON}} -m pytest tests/ -v --tb=short -x"
    watch: true

  lint:
    desc: Run ruff linter
    cmds:
      - "{{.VENV}}/bin/ruff check src/ tests/"

  lint:fix:
    desc: Run ruff linter with auto-fix
    cmds:
      - "{{.VENV}}/bin/ruff check --fix src/ tests/"

  fmt:
    desc: Format code with ruff
    cmds:
      - "{{.VENV}}/bin/ruff format src/ tests/"

  fmt:check:
    desc: Check formatting without changes
    cmds:
      - "{{.VENV}}/bin/ruff format --check src/ tests/"

  check:
    desc: Run lint, format check, and tests
    cmds:
      - task: lint
      - task: fmt:check
      - task: test

  clean:
    desc: Remove build artifacts and caches
    cmds:
      - rm -rf build/ dist/ *.spec
      - rm -rf __pycache__ src/__pycache__ tests/__pycache__
      - rm -rf .pytest_cache .ruff_cache
      - rm -rf {{.VENV}}

  build:
    desc: Build standalone executable with PyInstaller
    cmds:
      - "{{.PYTHON}} -m PyInstaller --onefile --windowed --name img2txt src/main.py"
